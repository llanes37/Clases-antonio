<!doctype html>
<!--
================================================================================
ARCHIVO: base.html (PLANTILLA BASE / LAYOUT)
================================================================================
¿QUÉ ES?
  La plantilla "madre" de la que heredan todas las demás páginas.
  Define la estructura común: head, navbar, footer, scripts.

¿CÓMO FUNCIONA LA HERENCIA EN DJANGO?
  1. Esta plantilla define "bloques" con {% block nombre %}{% endblock %}
  2. Las plantillas hijas usan {% extends 'base.html' %}
  3. Las hijas rellenan los bloques con su contenido específico

VENTAJAS:
  - DRY (Don't Repeat Yourself): el HTML común se escribe UNA vez
  - Consistencia: todas las páginas tienen la misma estructura
  - Mantenimiento: cambias el navbar aquí y se actualiza en todas partes

BLOQUES DISPONIBLES:
  - {% block content %}: contenido principal de cada página
  - Podrías añadir más: {% block title %}, {% block scripts %}, etc.
================================================================================
-->
<html lang="es">
  <head>
    <!-- ====================================================================
    SECCIÓN HEAD: metadatos, título, estilos
    ==================================================================== -->
    
    <!-- * Codificación de caracteres (UTF-8 para acentos y emojis) -->
    <meta charset="utf-8">
    
    <!-- * Viewport: hace la web responsive en móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- 
    TÍTULO DINÁMICO
    ================
    {{ title|default:"Django Tutorial" }}
    - title: variable que pasa la vista en el contexto
    - |default: filtro que pone un valor si title es None o vacío
    - Resultado: <title>Inicio</title> o <title>Django Tutorial</title>
    -->
    <title>{{ title|default:"Django Tutorial" }}</title>
    
    <!-- 
    BOOTSTRAP CSS (Framework de estilos)
    ====================================
    - Cargamos Bootstrap desde CDN (no necesitamos descargarlo)
    - Nos da clases CSS predefinidas: btn, card, navbar, row, col...
    - Versión 5.3.2 (la más reciente estable)
    -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    
    <!-- 
    ESTILOS PERSONALIZADOS
    ======================
    Pequeños ajustes que no vienen en Bootstrap
    -->
    <style>
      /* Tipografía y fondo general */
      body { 
        font-family: 'Segoe UI', sans-serif; 
        background: #f6f7fb; 
      }
      
      /* Bloques de código (para mostrar ejemplos) */
      .code-block { 
        background: #f5f5f5; 
        padding: 10px; 
        border-radius: 5px; 
        font-family: monospace; 
      }
      
      /* Títulos de sección */
      .section-title { 
        color: #0d6efd; 
        font-weight: bold; 
        margin-top: 20px; 
      }
    </style>
  </head>
  
  <body class="bg-light">
    <!-- ====================================================================
    NAVBAR (Barra de navegación)
    ====================================================================
    - navbar-dark bg-dark: fondo oscuro con texto claro
    - navbar-expand-lg: se colapsa en móviles, se expande en escritorio
    - Las clases de Bootstrap hacen todo el trabajo responsive
    ==================================================================== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <!-- 
        LOGO / BRAND
        ============
        {% url 'core:inicio' %} genera la URL: /
        - 'core:inicio' = namespace:nombre de la ruta
        - Es mejor que escribir "/" directamente (si cambias la ruta, sigue funcionando)
        -->
        <a class="navbar-brand" href="{% url 'core:inicio' %}">🐍 Django Tutorial</a>
        
        <!-- Links de navegación -->
        <div class="navbar-nav">
          <a class="nav-link" href="{% url 'core:inicio' %}">Inicio</a>
          <a class="nav-link" href="{% url 'core:about' %}">Acerca de</a>
          <a class="nav-link" href="{% url 'core:api_health' %}">Estado API</a>
        </div>
      </div>
    </nav>
    
    <!-- ====================================================================
    CONTENIDO PRINCIPAL (BLOQUE)
    ====================================================================
    Este es el bloque que las páginas hijas rellenan.
    Ejemplo en index.html:
      {% extends 'base.html' %}
      {% block content %}
        <h1>Mi contenido aquí</h1>
      {% endblock %}
    ==================================================================== -->
    <main class="container">
      {% block content %}
        <!-- Las páginas hijas ponen su contenido aquí -->
      {% endblock %}
    </main>
    
    <!-- ====================================================================
    FOOTER
    ==================================================================== -->
    <footer class="mt-5 py-3 text-center text-muted border-top">
      <small>🎓 Django Proyecto Fácil - Curso de Joaquín</small>
    </footer>
    
    <!-- 
    BOOTSTRAP JS
    ============
    - Necesario para componentes interactivos: dropdowns, modales, tooltips...
    - bundle.min.js incluye Popper.js (para posicionamiento)
    - Se carga al final para no bloquear el renderizado del HTML
    -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
